name: iOS Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode.app"

      - name: Run tests (Simulator)
        run: |
          xcodebuild \
            -project "Whist20.xcodeproj" \
            -scheme "Whist20" \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            test

